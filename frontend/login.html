<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — EventPulse</title>
  <meta name="description" content="Sign in to your EventPulse organizer account.">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">

  <style>
    body { font-family: 'Inter', sans-serif; }
    
    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    .bg-fluid-pastel {
      background: radial-gradient(circle at 20% 30%, #bbf7d0, transparent 40%),
                  radial-gradient(circle at 80% 20%, #fbcfe8, transparent 40%),
                  radial-gradient(circle at 50% 80%, #fef3c7, transparent 40%);
      background-color: #fafafa;
      background-size: 200% 200%;
      animation: gradientMove 15s ease infinite;
    }
  </style>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Sora', 'sans-serif'] },
        }
      }
    }
  </script>
</head>
<body class="antialiased bg-fluid-pastel min-h-screen flex items-center justify-center p-6">

  <div id="toast-container" aria-live="polite"></div>

  <div class="w-full max-w-md">
    <!-- Navbar / Logo Area -->
    <div class="flex justify-center mb-10">
      <a href="index.html" class="flex items-center gap-3 transition hover:scale-105 duration-300" aria-label="EventPulse Home">
        <div class="w-10 h-10 rounded-full bg-black flex items-center justify-center shadow-md">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        </div>
        <span class="font-display font-bold text-2xl text-black">EventPulse</span>
      </a>
    </div>

    <!-- Login Card -->
    <div class="bg-white/70 backdrop-blur-lg border border-white rounded-3xl p-8 sm:p-10 shadow-xl transition-all duration-300 hover:shadow-2xl">
      <h1 class="text-black font-display font-bold text-3xl mb-2 text-center">Welcome back</h1>
      <p class="text-gray-600 text-center mb-8">Sign in to your organizer account</p>

      <div class="hidden bg-red-100 text-red-700 px-4 py-3 rounded-xl mb-6 text-sm font-semibold" id="login-error" role="alert"></div>

      <form id="login-form" novalidate>
        <div class="mb-5">
          <label class="block text-black font-semibold text-sm mb-2" for="login-email">Email address</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            </div>
            <input type="email" class="w-full pl-12 pr-4 py-3 bg-white/50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-black focus:bg-white transition duration-300" id="login-email" placeholder="you@university.edu" required autocomplete="email">
          </div>
        </div>

        <div class="mb-8">
          <label class="block text-black font-semibold text-sm mb-2" for="login-password">Password</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <input type="password" class="w-full pl-12 pr-4 py-3 bg-white/50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-black focus:bg-white transition duration-300" id="login-password" placeholder="••••••••" required autocomplete="current-password">
          </div>
        </div>

        <button type="submit" class="w-full bg-black text-white py-3.5 rounded-full font-bold hover:opacity-80 transition duration-300 ease-in-out hover:scale-105 shadow-md flex items-center justify-center gap-2" id="login-btn" data-action="login">
          Sign In
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </form>

      <div class="text-center mt-8 text-sm text-gray-600">
        Don't have an account?
        <a href="register.html" class="text-black font-bold ml-1 hover:underline">Create one</a>
      </div>
      
      <div class="mt-8 pt-6 border-t border-gray-200 text-center">
        <a href="index.html" class="inline-flex items-center gap-2 text-gray-500 hover:text-black font-semibold text-sm transition duration-300">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          Back to Home
        </a>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js?v=9"></script>
</body>
</html>
