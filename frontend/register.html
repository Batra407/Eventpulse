<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — EventPulse</title>
  <meta name="description" content="Create your EventPulse organizer account and start collecting event feedback.">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">

  <style>
    body { font-family: 'Inter', sans-serif; }
    
    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    .bg-fluid-pastel {
      background: radial-gradient(circle at 20% 30%, #bbf7d0, transparent 40%),
                  radial-gradient(circle at 80% 20%, #fbcfe8, transparent 40%),
                  radial-gradient(circle at 50% 80%, #fef3c7, transparent 40%);
      background-color: #fafafa;
      background-size: 200% 200%;
      animation: gradientMove 15s ease infinite;
    }
  </style>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Sora', 'sans-serif'] },
        }
      }
    }
  </script>
</head>
<body class="antialiased bg-fluid-pastel min-h-screen flex items-center justify-center p-6">

  <div id="toast-container" aria-live="polite"></div>

  <div class="w-full max-w-md">
    <!-- Navbar / Logo Area -->
    <div class="flex justify-center mb-8">
      <a href="index.html" class="flex items-center gap-3 transition hover:scale-105 duration-300" aria-label="EventPulse Home">
        <div class="w-10 h-10 rounded-full bg-black flex items-center justify-center shadow-md">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        </div>
        <span class="font-display font-bold text-2xl text-black">EventPulse</span>
      </a>
    </div>

    <!-- Register Card -->
    <div class="bg-white/70 backdrop-blur-lg border border-white rounded-3xl p-8 sm:p-10 shadow-xl transition-all duration-300 hover:shadow-2xl">
      <h1 class="text-black font-display font-bold text-3xl mb-2 text-center">Create an account</h1>
      <p class="text-gray-600 text-center mb-6">Start collecting and analyzing event feedback</p>

      <div class="hidden bg-red-100 text-red-700 px-4 py-3 rounded-xl mb-6 text-sm font-semibold" id="register-error" role="alert"></div>

      <form id="register-form" novalidate>
        
        <div class="mb-4">
          <label class="block text-black font-semibold text-sm mb-2" for="reg-name">Full Name</label>
          <div class="relative">
            <input type="text" class="w-full px-4 py-3 bg-white/50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-black focus:bg-white transition duration-300 text-sm" id="reg-name" placeholder="Dr. Jane Smith" required autocomplete="name">
          </div>
        </div>

        <div class="mb-4">
          <label class="block text-black font-semibold text-sm mb-2" for="reg-email">Work Email</label>
          <div class="relative">
            <input type="email" class="w-full px-4 py-3 bg-white/50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-black focus:bg-white transition duration-300 text-sm" id="reg-email" placeholder="you@university.edu" required autocomplete="email">
          </div>
        </div>

        <div class="mb-6">
          <label class="block text-black font-semibold text-sm mb-2" for="reg-password">Password</label>
          <div class="relative">
            <input type="password" class="w-full px-4 py-3 bg-white/50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-black focus:bg-white transition duration-300 text-sm" id="reg-password" placeholder="Min. 6 characters" required autocomplete="new-password">
          </div>
        </div>

        <button type="submit" class="w-full bg-black text-white py-3.5 rounded-full font-bold hover:opacity-80 transition duration-300 ease-in-out hover:scale-105 shadow-md flex items-center justify-center gap-2" id="register-btn" data-action="register">
          Create Account
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </button>
      </form>

      <div class="text-center mt-6 text-sm text-gray-600">
        Already have an account?
        <a href="login.html" class="text-black font-bold ml-1 hover:underline">Sign in</a>
      </div>
      
      <div class="mt-6 pt-6 border-t border-gray-200 text-center">
        <a href="index.html" class="inline-flex items-center gap-2 text-gray-500 hover:text-black font-semibold text-sm transition duration-300">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          Back to Home
        </a>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js?v=9"></script>
</body>
</html>
