<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organizer Sign In — EventPulse</title>
  <meta name="description" content="Secure OTP-based sign in for EventPulse organizers.">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body { font-family: 'Inter', sans-serif; }
    @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .bg-fluid-author {
      background: radial-gradient(circle at 20% 30%, #c4b5fd, transparent 40%), radial-gradient(circle at 80% 20%, #a5b4fc, transparent 40%), radial-gradient(circle at 50% 80%, #ddd6fe, transparent 40%);
      background-color: #f5f3ff; background-size: 200% 200%; animation: gradientMove 15s ease infinite;
    }
    .step-panel.hidden { display: none; }
    .btn-author {
      background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%); color: white; border: none;
      border-radius: 9999px; font-weight: 700; transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 4px 20px rgba(124,58,237,0.35);
    }
    .btn-author:hover:not(:disabled) { transform: scale(1.03); box-shadow: 0 6px 28px rgba(124,58,237,0.45); }
    .btn-author:disabled { opacity: 0.6; cursor: not-allowed; }
    @keyframes shieldPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
    .shield-icon { animation: shieldPulse 3s ease-in-out infinite; }
  </style>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter','sans-serif'], display: ['Sora','sans-serif'] } } } }</script>
</head>
<body class="antialiased bg-fluid-author min-h-screen flex items-center justify-center p-6">

  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="flex justify-center mb-8">
      <a href="index.html" class="flex items-center gap-3 transition hover:scale-105 duration-300">
        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-violet-600 to-indigo-600 flex items-center justify-center shadow-lg">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        </div>
        <span class="font-display font-bold text-2xl text-gray-900">EventPulse</span>
      </a>
    </div>

    <!-- Card -->
    <div class="bg-white/75 backdrop-blur-xl border border-white/60 rounded-3xl p-8 sm:p-10 shadow-2xl">
      <div class="flex justify-center mb-6">
        <span class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-violet-100 text-violet-700 text-xs font-bold uppercase tracking-widest">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          Organizer / Author
        </span>
      </div>

      <!-- ── Step 1: Email ── -->
      <div id="step-email" class="step-panel">
        <div class="text-center mb-8">
          <div class="shield-icon w-16 h-16 rounded-2xl bg-gradient-to-br from-violet-100 to-indigo-100 flex items-center justify-center mx-auto mb-4">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          </div>
          <h1 class="text-gray-900 font-display font-bold text-3xl mb-2">Secure Sign In</h1>
          <p class="text-gray-500 text-sm">Enter your approved organizer email to receive a sign-in code</p>
        </div>

        <div id="email-error" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl mb-5 text-sm font-semibold" role="alert"></div>
        <!-- Pending account info banner -->
        <div id="pending-banner" class="hidden bg-amber-50 border border-amber-200 text-amber-800 px-4 py-3 rounded-xl mb-5 text-sm" role="alert">
          <p class="font-semibold">⏳ Account Pending Approval</p>
          <p class="mt-1">Your account is awaiting admin review. You'll receive access once approved.</p>
        </div>

        <div class="mb-5">
          <label class="block text-gray-800 font-semibold text-sm mb-2" for="author-email">Organizer Email</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            </div>
            <input type="email" id="author-email" placeholder="you@university.edu"
              class="w-full pl-12 pr-4 py-3 bg-white/60 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-violet-500 focus:bg-white transition text-sm"
              required autocomplete="email">
          </div>
        </div>

        <div class="mb-5">
          <label class="block text-gray-800 font-semibold text-sm mb-2" for="author-password">Password</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <input type="password" id="author-password" placeholder="••••••••"
              class="w-full pl-12 pr-4 py-3 bg-white/60 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-violet-500 focus:bg-white transition text-sm"
              required autocomplete="current-password">
          </div>
        </div>

        <button id="login-btn" onclick="handleLogin()" class="btn-author w-full py-3.5 flex items-center justify-center gap-2 text-sm">
          Sign In
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>

        <div class="mt-6 text-center text-sm text-gray-500">
          Don't have an account? <a href="register.html" class="text-violet-600 font-bold ml-1 hover:underline">Register here</a>
        </div>
        <div class="mt-3 text-center">
          <a href="user-login.html" class="text-xs text-gray-400 hover:text-gray-600 transition">Sign in as attendee instead →</a>
        </div>
      </div>

    </div>
    <div class="mt-6 text-center">
      <a href="index.html" class="inline-flex items-center gap-2 text-gray-400 hover:text-gray-700 font-semibold text-sm transition">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back to Home
      </a>
    </div>
  </div>

  <script>
    const API_BASE = '';

    const emailInput = document.getElementById('author-email');
    const passInput  = document.getElementById('author-password');
    const formErr    = document.getElementById('email-error');
    const loginBtn   = document.getElementById('login-btn');

    function showErr(msg) { formErr.textContent = msg; formErr.classList.remove('hidden'); }
    function hideErr()    { formErr.classList.add('hidden'); }

    // ── Check session via /api/v1/auth/me (cookie-based — NO localStorage) ──
    async function checkExistingSession() {
      try {
        const res = await fetch(`${API_BASE}/api/v1/auth/me`, { credentials: 'include' });
        if (res.ok) {
          window.location.replace('/dashboard.html');
        }
      } catch {}
    }
    checkExistingSession();

    // ── Login ─────────────────────────────────────────────────────────────
    async function handleLogin() {
      const email = emailInput.value.trim();
      const pass  = passInput.value;
      hideErr();
      document.getElementById('pending-banner').classList.add('hidden');

      if (!email || !/\S+@\S+\.\S+/.test(email)) { showErr('Please enter a valid email address.'); return; }
      if (!pass) { showErr('Please enter your password.'); return; }

      loginBtn.disabled = true;
      loginBtn.innerHTML = `<span class="inline-block w-4 h-4 border-2 border-white/40 border-t-white rounded-full animate-spin"></span> Signing in…`;

      try {
        const res  = await fetch(`${API_BASE}/api/v1/auth/login`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          credentials: 'include', // Important: receive HttpOnly cookies
          body: JSON.stringify({ email, password: pass }),
        });
        const json = await res.json();

        if (res.status === 403 && json.message?.includes('pending')) {
          document.getElementById('pending-banner').classList.remove('hidden');
          return;
        }

        if (!res.ok) throw new Error(json.message || 'Login failed');

        // Backend set HttpOnly cookies — no localStorage storage needed
        window.location.replace('/dashboard.html');
      } catch (err) {
        showErr(err.message || 'Login failed. Please try again.');
      } finally {
        loginBtn.disabled = false;
        loginBtn.innerHTML = `Sign In <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;
      }
    }

    passInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
  </script>
</body>
</html>
