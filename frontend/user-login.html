<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendee Sign In — EventPulse</title>
  <meta name="description" content="Sign in to your EventPulse attendee account to submit event feedback.">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">

  <style>
    body { font-family: 'Inter', sans-serif; }

    @keyframes gradientMove {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .bg-fluid-user {
      background:
        radial-gradient(circle at 20% 30%, #bbf7d0, transparent 40%),
        radial-gradient(circle at 80% 20%, #fbcfe8, transparent 40%),
        radial-gradient(circle at 50% 80%, #fef3c7, transparent 40%);
      background-color: #fafafa;
      background-size: 200% 200%;
      animation: gradientMove 15s ease infinite;
    }

    .btn-user {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
      border: none;
      border-radius: 9999px;
      font-weight: 700;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 4px 20px rgba(16,185,129,0.35);
    }
    .btn-user:hover:not(:disabled) {
      transform: scale(1.03);
      box-shadow: 0 6px 28px rgba(16,185,129,0.45);
    }
    .btn-user:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Tab switcher */
    .auth-tab { transition: background 0.2s, color 0.2s, box-shadow 0.2s; }
    .auth-tab.active {
      background: white;
      color: #059669;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
  </style>

  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter','sans-serif'], display: ['Sora','sans-serif'] } } } }</script>
</head>
<body class="antialiased bg-fluid-user min-h-screen flex items-center justify-center p-6">

  <div id="toast-container" aria-live="polite"></div>

  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="flex justify-center mb-8">
      <a href="index.html" class="flex items-center gap-3 transition hover:scale-105 duration-300" aria-label="EventPulse Home">
        <div class="w-10 h-10 rounded-full bg-black flex items-center justify-center shadow-md">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        </div>
        <span class="font-display font-bold text-2xl text-gray-900">EventPulse</span>
      </a>
    </div>

    <!-- Card -->
    <div class="bg-white/75 backdrop-blur-xl border border-white/60 rounded-3xl p-8 sm:p-10 shadow-2xl">

      <!-- Role badge -->
      <div class="flex justify-center mb-5">
        <span class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-emerald-100 text-emerald-700 text-xs font-bold uppercase tracking-widest">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Attendee / User
        </span>
      </div>

      <h1 class="text-gray-900 font-display font-bold text-3xl mb-2 text-center">Welcome back</h1>
      <p class="text-gray-500 text-sm text-center mb-6">Sign in to submit feedback for events you attended</p>

      <!-- Tab switcher: Login / Register -->
      <div class="flex bg-gray-100 rounded-2xl p-1 mb-6 gap-1">
        <button id="tab-login"    class="auth-tab active flex-1 py-2.5 rounded-xl text-sm font-bold text-gray-500" onclick="switchTab('login')">Sign In</button>
        <button id="tab-register" class="auth-tab flex-1 py-2.5 rounded-xl text-sm font-bold text-gray-500" onclick="switchTab('register')">Create Account</button>
      </div>

      <div id="form-error" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl mb-5 text-sm font-semibold" role="alert"></div>

      <!-- ── Login form ── -->
      <form id="login-form" novalidate>
        <div class="mb-4">
          <label class="block text-gray-800 font-semibold text-sm mb-2" for="user-email">Email</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
              <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            </div>
            <input type="email" id="user-email" placeholder="you@example.com"
              class="w-full pl-12 pr-4 py-3 bg-white/60 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition text-sm"
              autocomplete="email">
          </div>
        </div>

        <div class="mb-6">
          <label class="block text-gray-800 font-semibold text-sm mb-2" for="user-password">Password</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
              <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <input type="password" id="user-password" placeholder="••••••••"
              class="w-full pl-12 pr-4 py-3 bg-white/60 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition text-sm"
              autocomplete="current-password">
          </div>
        </div>

        <button type="submit" id="login-btn" class="btn-user w-full py-3.5 flex items-center justify-center gap-2 text-sm">
          Sign In
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </form>

      <!-- ── Register form ── -->
      <form id="register-form" class="hidden" novalidate>
        <div class="mb-4">
          <label class="block text-gray-800 font-semibold text-sm mb-2" for="reg-name">Full Name</label>
          <input type="text" id="reg-name" placeholder="Your name"
            class="w-full px-4 py-3 bg-white/60 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition text-sm"
            autocomplete="name">
        </div>

        <div class="mb-4">
          <label class="block text-gray-800 font-semibold text-sm mb-2" for="reg-email">Email</label>
          <input type="email" id="reg-email" placeholder="you@example.com"
            class="w-full px-4 py-3 bg-white/60 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition text-sm"
            autocomplete="email">
        </div>

        <div class="mb-6">
          <label class="block text-gray-800 font-semibold text-sm mb-2" for="reg-password">Password <span class="text-gray-400 font-normal">(min. 6 chars)</span></label>
          <input type="password" id="reg-password" placeholder="Choose a password"
            class="w-full px-4 py-3 bg-white/60 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition text-sm"
            autocomplete="new-password">
        </div>

        <button type="submit" id="register-btn" class="btn-user w-full py-3.5 flex items-center justify-center gap-2 text-sm">
          Create Account
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </button>
      </form>

      <!-- Switch to organizer -->
      <div class="mt-6 pt-5 border-t border-gray-100 text-center">
        <a href="author-login.html" class="inline-flex items-center gap-2 text-xs text-violet-600 hover:underline font-semibold">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          Sign in as Organizer instead
        </a>
      </div>
    </div>

    <!-- Back home -->
    <div class="mt-6 text-center">
      <a href="index.html" class="inline-flex items-center gap-2 text-gray-400 hover:text-gray-700 font-semibold text-sm transition">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back to Home
      </a>
    </div>
  </div>

  <script>
    const API_BASE = '';

    function showToast(msg, type = 'success') {
      const colors = { success: '#10b981', error: '#ef4444', info: '#6366f1' };
      const t = document.createElement('div');
      t.style.cssText = `
        position:fixed;bottom:24px;right:24px;z-index:9999;
        background:white;border-left:4px solid ${colors[type]||colors.info};
        padding:14px 18px;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,0.12);
        font-size:14px;font-weight:600;max-width:320px;color:#111;
      `;
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 4000);
    }

    function showError(msg) {
      const el = document.getElementById('form-error');
      el.textContent = msg;
      el.classList.remove('hidden');
    }
    function hideError() { document.getElementById('form-error').classList.add('hidden'); }

    function switchTab(tab) {
      const loginForm  = document.getElementById('login-form');
      const regForm    = document.getElementById('register-form');
      const tabLogin   = document.getElementById('tab-login');
      const tabReg     = document.getElementById('tab-register');
      hideError();
      if (tab === 'login') {
        loginForm.classList.remove('hidden');
        regForm.classList.add('hidden');
        tabLogin.classList.add('active');
        tabReg.classList.remove('active');
      } else {
        loginForm.classList.add('hidden');
        regForm.classList.remove('hidden');
        tabLogin.classList.remove('active');
        tabReg.classList.add('active');
      }
    }

    // ── Login ─────────────────────────────────────────────────────────────
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      const email    = document.getElementById('user-email').value.trim();
      const password = document.getElementById('user-password').value;
      const btn      = document.getElementById('login-btn');

      if (!email || !password) { showError('Please fill in all fields.'); return; }

      btn.disabled = true;
      btn.innerHTML = `<span class="inline-block w-4 h-4 border-2 border-white/40 border-t-white rounded-full animate-spin"></span> Signing in…`;

      try {
        const res  = await fetch(`${API_BASE}/api/v1/users/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const json = await res.json();
        if (!res.ok) throw new Error(json.message || 'Login failed');

        const { token, user } = json.data;
        localStorage.setItem('ep_user_token', token);
        localStorage.setItem('ep_user', JSON.stringify(user));
        localStorage.setItem('ep_role', 'user');

        showToast(`Welcome back, ${user.name}! 🎉`, 'success');

        // Redirect: return to feedback page if came from there
        const returnTo = new URLSearchParams(location.search).get('returnTo') || 'feedback.html';
        setTimeout(() => { window.location.href = returnTo; }, 700);
      } catch (err) {
        showError(err.message || 'Login failed.');
        btn.disabled = false;
        btn.innerHTML = `Sign In <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;
      }
    });

    // ── Register ──────────────────────────────────────────────────────────
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      const name     = document.getElementById('reg-name').value.trim();
      const email    = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const btn      = document.getElementById('register-btn');

      if (!name || !email || !password) { showError('Please fill in all fields.'); return; }
      if (password.length < 6) { showError('Password must be at least 6 characters.'); return; }

      btn.disabled = true;
      btn.innerHTML = `<span class="inline-block w-4 h-4 border-2 border-white/40 border-t-white rounded-full animate-spin"></span> Creating account…`;

      try {
        const res  = await fetch(`${API_BASE}/api/v1/users/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password }),
        });
        const json = await res.json();
        if (!res.ok) throw new Error(json.message || 'Registration failed');

        const { token, user } = json.data;
        localStorage.setItem('ep_user_token', token);
        localStorage.setItem('ep_user', JSON.stringify(user));
        localStorage.setItem('ep_role', 'user');

        showToast('Account created!', 'success');
        const returnTo = new URLSearchParams(location.search).get('returnTo') || 'feedback.html';
        setTimeout(() => { window.location.href = returnTo; }, 700);
      } catch (err) {
        showError(err.message || 'Registration failed.');
        btn.disabled = false;
        btn.innerHTML = `Create Account <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>`;
      }
    });

    // Redirect if already logged in as user
    if (localStorage.getItem('ep_user_token') && localStorage.getItem('ep_role') === 'user') {
      const returnTo = new URLSearchParams(location.search).get('returnTo') || 'feedback.html';
      window.location.href = returnTo;
    }
  </script>
</body>
</html>
